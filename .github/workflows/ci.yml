name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run checks
        shell: bash
        run: |
          go test ./...
          go vet ./...
          go build ./...
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./...
          else
            go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run ./...
          fi

  checks-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run checks
        shell: bash
        run: |
          go test ./...
          go vet ./...
          go build ./...
          if command -v golangci-lint >/dev/null 2>&1; then
            golangci-lint run ./...
          else
            go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run ./...
          fi

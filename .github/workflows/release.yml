name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  issues: write

jobs:
  guard-main:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Ensure tagged commit is on main
        id: check
        shell: bash
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "on_main=false" >> "$GITHUB_OUTPUT"
          echo "Tag ${GITHUB_REF_NAME} is not on main. Skipping release."

  build:
    runs-on: ubuntu-latest
    needs: guard-main
    if: needs.guard-main.outputs.on_main == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            ext: .exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Build binary and package
        shell: bash
        env:
          VERSION: ${{ needs.guard-main.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail

          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          COMMIT_SHORT="${GITHUB_SHA::7}"
          BASE="qrrun_${VERSION}_${GOOS}_${GOARCH}"
          BIN="${BASE}${EXT}"

          mkdir -p dist

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build \
              -trimpath \
              -ldflags "-s -w -X 'main.version=${VERSION}' -X 'main.commit=${COMMIT_SHORT}' -X 'main.date=${DATE}'" \
              -o "dist/${BIN}" \
              ./cmd/qrrun

          if [ "$ARCHIVE" = "zip" ]; then
            (cd dist && zip -q "${BASE}.zip" "${BIN}")
          else
            tar -C dist -czf "dist/${BASE}.tar.gz" "${BIN}"
          fi

          if [ "$GOOS" = "linux" ]; then
            export VERSION GOOS GOARCH BIN
            bash ./scripts/release_package_deb.sh
            bash ./scripts/release_package_rpm.sh
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: ignore

      - name: Upload packaged artifact (deb)
        if: matrix.goos == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Upload packaged artifact (rpm)
        if: matrix.goos == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}-rpm
          path: dist/*.rpm
          if-no-files-found: error

      - name: Upload packaged artifact (zip)
        if: matrix.archive == 'zip'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}-zip
          path: dist/*.zip
          if-no-files-found: error

  build-msi:
    runs-on: windows-latest
    needs: guard-main
    if: needs.guard-main.outputs.on_main == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            wix_arch: x64
          - goarch: arm64
            wix_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install WiX Toolset
        shell: powershell
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows binary and MSI
        shell: powershell
        env:
          VERSION: ${{ needs.guard-main.outputs.version }}
          GOARCH: ${{ matrix.goarch }}
          WIX_ARCH: ${{ matrix.wix_arch }}
        run: |
          ./scripts/release_build_windows_msi.ps1

      - name: Validate MSI installer behavior
        shell: powershell
        env:
          VERSION: ${{ needs.guard-main.outputs.version }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ./scripts/validate_windows_msi.ps1 -MsiPath "dist/qrrun_${env:VERSION}_windows_${env:GOARCH}.msi" -GoArch $env:GOARCH

      - name: Upload MSI validation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-${{ matrix.goarch }}-msi-validation-logs
          path: dist/msi-validation-logs/*.log
          if-no-files-found: warn

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-${{ matrix.goarch }}-msi
          path: dist/*.msi
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - guard-main
      - build
      - build-msi
    if: needs.guard-main.outputs.on_main == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate Homebrew formula
        shell: bash
        env:
          VERSION: ${{ needs.guard-main.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          bash ./scripts/release_generate_homebrew_formula.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.guard-main.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.msi
            dist/*.deb
            dist/*.rpm
            dist/homebrew/*.rb

  winget-pr:
    runs-on: ubuntu-latest
    needs:
      - guard-main
      - release
    if: needs.guard-main.outputs.on_main == 'true' && !contains(needs.guard-main.outputs.version, '-alpha') && !contains(needs.guard-main.outputs.version, '-beta') && !contains(needs.guard-main.outputs.version, '-rc')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check WINGET_PKGS_PAT
        id: token
        shell: bash
        env:
          WINGET_PKGS_PAT: ${{ secrets.WINGET_PKGS_PAT }}
        run: |
          if [ -z "${WINGET_PKGS_PAT}" ]; then
            echo "::warning::WINGET_PKGS_PAT is not set. Skipping winget-pkgs PR automation."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Open winget-pkgs PR
        if: steps.token.outputs.enabled == 'true'
        shell: bash
        env:
          VERSION: ${{ needs.guard-main.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WINGET_PKGS_PAT: ${{ secrets.WINGET_PKGS_PAT }}
          QRRUN_GITHUB_TOKEN: ${{ github.token }}
        run: |
          bash ./scripts/release_open_winget_pr.sh

  homebrew-tap-pr:
    runs-on: ubuntu-latest
    needs:
      - guard-main
      - release
    if: needs.guard-main.outputs.on_main == 'true' && !contains(needs.guard-main.outputs.version, '-alpha') && !contains(needs.guard-main.outputs.version, '-beta') && !contains(needs.guard-main.outputs.version, '-rc')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check HOMEBREW_TAP_PAT
        id: token
        shell: bash
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          if [ -z "${HOMEBREW_TAP_PAT}" ]; then
            echo "::warning::HOMEBREW_TAP_PAT is not set. Skipping homebrew-tap PR automation."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Open homebrew-tap PR
        if: steps.token.outputs.enabled == 'true'
        shell: bash
        env:
          VERSION: ${{ needs.guard-main.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
          QRRUN_GITHUB_TOKEN: ${{ github.token }}
        run: |
          bash ./scripts/release_open_homebrew_tap_pr.sh

  linux-packages-pr:
    runs-on: ubuntu-latest
    needs:
      - guard-main
      - release
    if: needs.guard-main.outputs.on_main == 'true' && !contains(needs.guard-main.outputs.version, '-alpha') && !contains(needs.guard-main.outputs.version, '-beta') && !contains(needs.guard-main.outputs.version, '-rc')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check LINUX_PACKAGES_PAT
        id: token
        shell: bash
        env:
          LINUX_PACKAGES_PAT: ${{ secrets.LINUX_PACKAGES_PAT }}
          LINUX_REPO_GPG_PRIVATE_KEY: ${{ secrets.LINUX_REPO_GPG_PRIVATE_KEY }}
          LINUX_REPO_GPG_PASSPHRASE: ${{ secrets.LINUX_REPO_GPG_PASSPHRASE }}
        run: |
          if [ -z "${LINUX_PACKAGES_PAT}" ]; then
            echo "::warning::LINUX_PACKAGES_PAT is not set. Skipping linux-packages PR automation."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${LINUX_REPO_GPG_PRIVATE_KEY}" ] || [ -z "${LINUX_REPO_GPG_PASSPHRASE}" ]; then
            echo "::warning::LINUX_REPO_GPG_PRIVATE_KEY or LINUX_REPO_GPG_PASSPHRASE is not set. Skipping linux-packages PR automation."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Install Linux repository metadata tools
        if: steps.token.outputs.enabled == 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils createrepo-c gnupg

      - name: Open linux-packages PR
        if: steps.token.outputs.enabled == 'true'
        shell: bash
        env:
          VERSION: ${{ needs.guard-main.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LINUX_PACKAGES_PAT: ${{ secrets.LINUX_PACKAGES_PAT }}
          QRRUN_GITHUB_TOKEN: ${{ github.token }}
          LINUX_REPO_GPG_PRIVATE_KEY: ${{ secrets.LINUX_REPO_GPG_PRIVATE_KEY }}
          LINUX_REPO_GPG_PASSPHRASE: ${{ secrets.LINUX_REPO_GPG_PASSPHRASE }}
        run: |
          bash ./scripts/release_open_linux_packages_pr.sh

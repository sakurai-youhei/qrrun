name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  guard-main:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Ensure tagged commit is on main
        id: check
        shell: bash
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "on_main=false" >> "$GITHUB_OUTPUT"
          echo "Tag ${GITHUB_REF_NAME} is not on main. Skipping release."

  build:
    runs-on: ubuntu-latest
    needs: guard-main
    if: needs.guard-main.outputs.on_main == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            ext: .exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Build binary and package
        shell: bash
        env:
          VERSION: ${{ needs.guard-main.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail

          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          COMMIT_SHORT="${GITHUB_SHA::7}"
          BASE="qrrun_${VERSION}_${GOOS}_${GOARCH}"
          BIN="${BASE}${EXT}"

          mkdir -p dist

          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
            go build \
              -trimpath \
              -ldflags "-s -w -X 'main.version=${VERSION}' -X 'main.commit=${COMMIT_SHORT}' -X 'main.date=${DATE}'" \
              -o "dist/${BIN}" \
              ./cmd/qrrun

          if [ "$ARCHIVE" = "zip" ]; then
            (cd dist && zip -q "${BASE}.zip" "${BIN}")
          else
            tar -C dist -czf "dist/${BASE}.tar.gz" "${BIN}"
          fi

          if [ "$GOOS" = "linux" ]; then
            DEB_ARCH="$GOARCH"
            DEB_VERSION="${VERSION#v}"
            DEB_BASE="qrrun_${DEB_VERSION}_${DEB_ARCH}"
            PKG_ROOT="dist/${DEB_BASE}"

            mkdir -p "${PKG_ROOT}/DEBIAN" "${PKG_ROOT}/usr/bin"
            install -m 0755 "dist/${BIN}" "${PKG_ROOT}/usr/bin/qrrun"

            cat > "${PKG_ROOT}/DEBIAN/control" <<EOF
Package: qrrun
Version: ${DEB_VERSION}
Section: utils
Priority: optional
Architecture: ${DEB_ARCH}
Maintainer: qrrun maintainers
Description: Tunnel local code and run it via QR
EOF

            dpkg-deb --build --root-owner-group "${PKG_ROOT}" "dist/${DEB_BASE}.deb"

            RPM_ARCH="$GOARCH"
            if [ "$GOARCH" = "amd64" ]; then
              RPM_ARCH="x86_64"
            elif [ "$GOARCH" = "arm64" ]; then
              RPM_ARCH="aarch64"
            fi
            RPM_VERSION="${DEB_VERSION%%-*}"
            RPM_RELEASE="1"
            if [ "${DEB_VERSION}" != "${RPM_VERSION}" ]; then
              RPM_RELEASE="0.$(echo "${DEB_VERSION#${RPM_VERSION}-}" | tr -c '[:alnum:].' '.')"
            fi

            RPM_TOPDIR="$PWD/dist/rpmbuild"
            mkdir -p "${RPM_TOPDIR}/BUILD" "${RPM_TOPDIR}/RPMS" "${RPM_TOPDIR}/SOURCES" "${RPM_TOPDIR}/SPECS" "${RPM_TOPDIR}/SRPMS"
            cp "dist/${BIN}" "${RPM_TOPDIR}/SOURCES/qrrun"

            cat > "${RPM_TOPDIR}/SPECS/qrrun.spec" <<EOF
Name:           qrrun
Version:        ${RPM_VERSION}
Release:        ${RPM_RELEASE}
Summary:        Tunnel local code and run it via QR
License:        MIT
BuildArch:      ${RPM_ARCH}
Source0:        qrrun

%description
Tunnel local code and run it via QR.

%prep

%build

%install
mkdir -p %{buildroot}/usr/bin
install -m 0755 %{SOURCE0} %{buildroot}/usr/bin/qrrun

%files
/usr/bin/qrrun

%changelog
* $(date -u '+%a %b %d %Y') qrrun maintainers - ${DEB_VERSION}
- Automated release build
EOF

            rpmbuild --define "_topdir ${RPM_TOPDIR}" -bb "${RPM_TOPDIR}/SPECS/qrrun.spec"
            find "${RPM_TOPDIR}/RPMS" -type f -name '*.rpm' -exec cp {} dist/ \;
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: ignore

      - name: Upload packaged artifact (deb)
        if: matrix.goos == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Upload packaged artifact (rpm)
        if: matrix.goos == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}-rpm
          path: dist/*.rpm
          if-no-files-found: error

      - name: Upload packaged artifact (zip)
        if: matrix.archive == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}-zip
          path: dist/*.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - guard-main
      - build
    if: needs.guard-main.outputs.on_main == 'true'
    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.guard-main.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
        files: \.py$
      - id: check-shebang-scripts-are-executable
      - id: debug-statements
        files: \.py$
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: \.sh$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.8.0-1
    hooks:
      - id: shfmt
        args: [-w, -i, "2", -ci]
        files: \.sh$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        args: [--fix]
        files: \.py$
      - id: ruff-format
        files: \.py$

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.9.0
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/checkmake/checkmake
    rev: v0.3.2
    hooks:
      - id: checkmake

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [--strict, -c, .yamllint]

  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.8
    hooks:
      - id: golangci-lint-full

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        files: \.go$

      - id: ty
        name: ty
        entry: ty check
        language: python
        additional_dependencies:
          - ty
        files: \.py$

      - id: blinter
        name: blinter
        entry: blinter .
        language: python
        additional_dependencies:
          - Blinter
        pass_filenames: false
        files: \.(bat|cmd)$

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        language: system
        entry: pwsh -NoLogo -NoProfile -NonInteractive -File scripts/precommit_psscriptanalyzer.ps1
        files: \.ps1$

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false
